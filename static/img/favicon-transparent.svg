<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- No background rect — fully transparent -->

  <!-- Subtle grid lines -->
  <line x1="6" y1="32" x2="58" y2="32" stroke="#cc0000" stroke-width="0.5" opacity="0.2"/>
  <line x1="6" y1="22" x2="58" y2="22" stroke="#cc0000" stroke-width="0.3" opacity="0.15"/>
  <line x1="6" y1="42" x2="58" y2="42" stroke="#cc0000" stroke-width="0.3" opacity="0.15"/>

  <!-- Latency spike waveform -->
  <polyline
    points="6,32 14,32 17,14 21,50 25,26 29,32 34,32 38,10 43,54 47,24 51,32 58,32"
    fill="none"
    stroke="#cc0000"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Endpoint dots -->
  <circle cx="6" cy="32" r="2" fill="#cc0000" opacity="0.5"/>
  <circle cx="58" cy="32" r="2" fill="#cc0000" opacity="0.5"/>

  <!-- HyyperWAN label -->
  <text
    x="32"
    y="59"
    text-anchor="middle"
    font-family="monospace"
    font-size="7"
    font-weight="500"
    fill="#cc0000"
    opacity="0.85">HyyperWAN</text>
</svg>
